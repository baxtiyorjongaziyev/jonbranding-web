packages:
  - .
  - services/portfolio-bot

recursiveInstall: false

allowBuilds:
  '@firebase/util': true
  bufferutil: false
  core-js: false
  es5-ext: false
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: false
  workerd: true

overrides:
  js-yaml@<3.15.0: 3.15.0
  postcss@<8.5.10: 8.5.15
  smol-toml@<1.6.1: 1.6.1
  uuid@<11.1.1: 11.1.1
