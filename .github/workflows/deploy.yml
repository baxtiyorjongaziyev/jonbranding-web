name: Jon Branding — Notify Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    name: Notify via Telegram
    runs-on: ubuntu-latest
    steps:
      - name: Notify
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.OISHA_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=150074828" \
            -d "text=🚀 jonbranding.uz%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}" || true
