name: Netlify Deploy

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - DEV_LOG.md
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Verify Netlify build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build for Netlify
        run: npm run build:netlify
        env:
          NETLIFY: 'true'
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_OISHA_API_URL: ${{ secrets.NEXT_PUBLIC_OISHA_API_URL }}
          NEXT_TELEMETRY_DISABLED: '1'

  deploy:
    name: Netlify deploy status
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Use Netlify Git-based deploy
        run: |
          echo "Netlify production deploy is handled by connecting this GitHub repo in Netlify."
          echo "This workflow verifies that the same Next.js build succeeds before Netlify deploys main."
