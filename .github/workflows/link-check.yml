name: Link Check

on:
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    name: Check public links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs/**/*.md
          fail: true
