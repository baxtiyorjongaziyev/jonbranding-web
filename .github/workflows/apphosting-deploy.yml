name: Firebase App Hosting Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - DEV_LOG.md
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FIREBASE_PROJECT_ID: jonbranding-85662071-ea38e
  APP_HOSTING_BACKEND: jonbranding-web

jobs:
  deploy:
    name: Build and deploy jonbranding.uz
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_OISHA_API_URL: ${{ secrets.NEXT_PUBLIC_OISHA_API_URL }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy jonbranding-web backend
        run: |
          firebase apphosting:rollouts:create "$APP_HOSTING_BACKEND" \
            --project "$FIREBASE_PROJECT_ID" \
            --git-commit "$GITHUB_SHA" \
            --force \
            --non-interactive
